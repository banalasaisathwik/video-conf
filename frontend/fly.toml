app = "replace-with-your-frontend-app"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    VITE_WEBSOCKET_URL = "wss://replace-with-your-server-app.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
