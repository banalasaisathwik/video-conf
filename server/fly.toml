# fly.toml app configuration file generated for replace-with-your-server-app on 2026-03-29T09:59:55+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'replace-with-your-server-app'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOST = '0.0.0.0'
  MEDIASOUP_ANNOUNCED_ADDRESS = 'replace-with-your-server-app.fly.dev'
  MEDIASOUP_PORT = '40000'
  MEDIASOUP_TCP_LISTEN_IP = '0.0.0.0'
  MEDIASOUP_UDP_LISTEN_IP = '0.0.0.0'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = 'udp'
  internal_port = 40000

  [[services.ports]]
    port = 40000

[[services]]
  protocol = 'tcp'
  internal_port = 40000

  [[services.ports]]
    port = 40000

[checks]
  [checks.server_health]
    port = 8080
    type = 'http'
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
